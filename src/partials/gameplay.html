<article id="gameplay" class="mds_gameplay">
  <div class="container mds_gameplay-wrapper">
    <div class="mds_gameplay-info">
      <h2 class="mds_gameplay-title">Simple to move. Harder to master.</h2>
      <p class="mds_gameplay-subtitle">There's no complicated system here.</p>
    </div>

    <div class="mds_gameplay-slider-viewport">
      <div class="mds_gameplay-slider-track" data-slider-track>
        <figure class="mds_gameplay-slide" data-slider-slide>
          <picture>
            <source
              media="(min-width: 1440px)"
              srcset="
                /img/gameplay/gameplay1.png    1x,
                /img/gameplay/gameplay1@2x.png 2x
              "
              type="image/png"
            />
            <source
              srcset="
                /img/gameplay/gameplay1-mob.png    1x,
                /img/gameplay/gameplay1-mob@2x.png 2x
              "
              type="image/png"
            />
            <img
              class="mds_gameplay-img"
              src="/img/gameplay/gameplay1.png"
              alt="Swipe to guide the light"
              loading="lazy"
            />
          </picture>
          <figcaption class="mds_gameplay-caption">
            Swipe to guide the light
          </figcaption>
        </figure>

        <figure class="mds_gameplay-slide" data-slider-slide>
          <picture>
            <source
              media="(min-width: 1440px)"
              srcset="
                /img/gameplay/gameplay2.png    1x,
                /img/gameplay/gameplay2@2x.png 2x
              "
              type="image/png"
            />
            <source
              srcset="
                /img/gameplay/gameplay2-mob.png    1x,
                /img/gameplay/gameplay2-mob@2x.png 2x
              "
              type="image/png"
            />
            <img
              class="mds_gameplay-img"
              src="/img/gameplay/gameplay2.png"
              alt="Follow the paths"
              loading="lazy"
            />
          </picture>
          <figcaption class="mds_gameplay-caption">Follow the paths</figcaption>
        </figure>

        <figure class="mds_gameplay-slide" data-slider-slide>
          <picture>
            <source
              media="(min-width: 1440px)"
              srcset="
                /img/gameplay/gameplay3.png    1x,
                /img/gameplay/gameplay3@2x.png 2x
              "
              type="image/png"
            />
            <source
              srcset="
                /img/gameplay/gameplay3-mob.png    1x,
                /img/gameplay/gameplay3-mob@2x.png 2x
              "
              type="image/png"
            />
            <img
              class="mds_gameplay-img"
              src="/img/gameplay/gameplay3.png"
              alt="Find the exit"
              loading="lazy"
            />
          </picture>
          <figcaption class="mds_gameplay-caption">Find the exit</figcaption>
        </figure>
      </div>
    </div>

    <div class="mds_gameplay-controls" aria-label="Slider navigation">
      <button
        type="button"
        class="mds_gameplay-ctrl-btn btn-prev"
        data-slider-prev
        aria-label="Previous slide"
      >
        <svg class="mds_ctrl-icon">
          <use href="/sprite.svg#arow-back"></use>
        </svg>
      </button>

      <div class="mds_gameplay-dots" aria-label="Slides">
        <button
          type="button"
          class="mds_gameplay-dot active"
          data-slider-dot
          data-slide="0"
          aria-label="Go to slide 1"
        ></button>
        <button
          type="button"
          class="mds_gameplay-dot"
          data-slider-dot
          data-slide="1"
          aria-label="Go to slide 2"
        ></button>
        <button
          type="button"
          class="mds_gameplay-dot"
          data-slider-dot
          data-slide="2"
          aria-label="Go to slide 3"
        ></button>
      </div>

      <button
        type="button"
        class="mds_gameplay-ctrl-btn btn-next"
        data-slider-next
        aria-label="Next slide"
      >
        <svg class="mds_ctrl-icon">
          <use href="/sprite.svg#arow-forward"></use>
        </svg>
      </button>
    </div>

    <div class="mds_gameplay-description">
      <p>
        That’s it. And yet... some mazes feel effortless, while others make you
        pause, retrace, and rethink everything.
      </p>
      <p>It’s not about speed.</p>
      <p>It’s about seeing what you missed the first time.</p>
    </div>
  </div>
</article>
