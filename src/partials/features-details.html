<article id="features-details" class="fdtl_features-details">
  <div class="fdtl_container fdtl_features-details-wrapper">
    <div class="fdtl_features-details-header">
      <h2 class="fdtl_features-details-title">
        Everything you need. Nothing you don’t.
      </h2>
      <p class="fdtl_features-details-subtitle">
        Here’s what you actually get with Maze Classic:
      </p>
    </div>

    <div class="fdtl_features-details-slider-viewport">
      <div class="fdtl_features-details-slider-track" data-fd-track>
        <figure class="fdtl_features-details-slide" data-fd-slide>
          <picture>
            <source
              srcset="
                ./img/features-details/feature-details1.png    1x,
                ./img/features-details/feature-details1@2x.png 2x
              "
              type="image/png"
            />
            <img
              class="fdtl_features-details-img"
              src="./img/features-details/feature-details1.png"
              alt="Cube maze icon"
              loading="lazy"
            />
          </picture>
          <figcaption class="fdtl_features-details-caption">
            More than 100 different mazes
          </figcaption>
        </figure>

        <figure class="fdtl_features-details-slide" data-fd-slide>
          <picture>
            <source
              srcset="
                ./img/features-details/feature-details2.png    1x,
                ./img/features-details/feature-details2@2x.png 2x
              "
              type="image/png"
            />
            <img
              class="fdtl_features-details-img"
              src="./img/features-details/feature-details2.png"
              alt="Grid modes icon"
              loading="lazy"
            />
          </picture>
          <figcaption class="fdtl_features-details-caption">
            Multiple labyrinth modes to explore
          </figcaption>
        </figure>

        <figure class="fdtl_features-details-slide" data-fd-slide>
          <picture>
            <source
              srcset="
                ./img/features-details/feature-details3.png    1x,
                ./img/features-details/feature-details3@2x.png 2x
              "
              type="image/png"
            />
            <img
              class="fdtl_features-details-img"
              src="./img/features-details/feature-details3.png"
              alt="Hand click icon"
              loading="lazy"
            />
          </picture>
          <figcaption class="fdtl_features-details-caption">
            Thank god the controls actually work properly - I’m so sick of
            puzzle games where the touch response is all wonky.
          </figcaption>
        </figure>

        <figure class="fdtl_features-details-slide" data-fd-slide>
          <picture>
            <source
              srcset="
                ./img/features-details/feature-details4.png    1x,
                ./img/features-details/feature-details4@2x.png 2x
              "
              type="image/png"
            />
            <img
              class="fdtl_features-details-img"
              src="./img/features-details/feature-details4.png"
              alt="Sun icon"
              loading="lazy"
            />
          </picture>
          <figcaption class="fdtl_features-details-caption">
            Clean graphics that don’t overwhelm you
          </figcaption>
        </figure>

        <figure class="fdtl_features-details-slide" data-fd-slide>
          <picture>
            <source
              srcset="
                ./img/features-details/feature-details5.png    1x,
                ./img/features-details/feature-details5@2x.png 2x
              "
              type="image/png"
            />
            <img
              class="fdtl_features-details-img"
              src="./img/features-details/feature-details5.png"
              alt="Growth chart icon"
              loading="lazy"
            />
          </picture>
          <figcaption class="fdtl_features-details-caption">
            It gets harder gradually without feeling like they’re just trying to
            frustrate you
          </figcaption>
        </figure>
      </div>
    </div>

    <div class="fdtl_features-details-controls" aria-label="Slider navigation">
      <button
        type="button"
        class="fdtl_features-details-ctrl-btn"
        data-fd-prev
        aria-label="Previous slide"
      >
        <svg class="fdtl_ctrl-icon">
          <use href="/sprite.svg#arow-back"></use>
        </svg>
      </button>

      <div class="fdtl_features-details-dots" aria-label="Slides">
        <button
          type="button"
          class="fdtl_features-details-dot active"
          data-fd-dot
          data-slide="0"
          aria-label="Go to slide 1"
        ></button>
        <button
          type="button"
          class="fdtl_features-details-dot"
          data-fd-dot
          data-slide="1"
          aria-label="Go to slide 2"
        ></button>
        <button
          type="button"
          class="fdtl_features-details-dot"
          data-fd-dot
          data-slide="2"
          aria-label="Go to slide 3"
        ></button>
        <button
          type="button"
          class="fdtl_features-details-dot"
          data-fd-dot
          data-slide="3"
          aria-label="Go to slide 4"
        ></button>
        <button
          type="button"
          class="fdtl_features-details-dot"
          data-fd-dot
          data-slide="4"
          aria-label="Go to slide 5"
        ></button>
      </div>

      <button
        type="button"
        class="fdtl_features-details-ctrl-btn"
        data-fd-next
        aria-label="Next slide"
      >
        <svg class="fdtl_ctrl-icon">
          <use href="/sprite.svg#arow-forward"></use>
        </svg>
      </button>
    </div>

    <div class="fdtl_features-details-description">
      <p>
        It’s built for everyone — <br />
        kids, adults, anyone who enjoys figuring things out.
      </p>
    </div>
  </div>
</article>
