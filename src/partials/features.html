<article id="feature-info" class="finf_feature-info">
  <div class="container finf_feature-info-wrapper">
    <div class="finf_feature-info-header">
      <h2 class="finf_feature-info-title">
        It’s quiet, no rush – just you figuring out the maze.
      </h2>
      <p class="finf_feature-info-subtitle">
        Some games try to keep you busy.<br />This one lets you slow down.
      </p>
    </div>

    <div class="finf_feature-info-slider-viewport">
      <div class="finf_feature-info-slider-track" data-fi-track>
        <figure class="finf_feature-info-slide" data-fi-slide>
          <picture>
            <source
              srcset="
                ./img/feature-info/feature-info1.png    1x,
                ./img/feature-info/feature-info1@2x.png 2x
              "
              type="image/png"
            />
            <img
              class="finf_feature-info-img"
              src="./img/feature-info/feature-info1.png"
              alt="No internet required icon"
              loading="lazy"
            />
          </picture>
          <figcaption class="finf_feature-info-caption">
            No internet required
          </figcaption>
        </figure>

        <figure class="finf_feature-info-slide" data-fi-slide>
          <picture>
            <source
              srcset="
                ./img/feature-info/feature-info2.png    1x,
                ./img/feature-info/feature-info2@2x.png 2x
              "
              type="image/png"
            />
            <img
              class="finf_feature-info-img"
              src="./img/feature-info/feature-info2.png"
              alt="No interruptions icon"
              loading="lazy"
            />
          </picture>
          <figcaption class="finf_feature-info-caption">
            No interruptions
          </figcaption>
        </figure>

        <figure class="finf_feature-info-slide" data-fi-slide>
          <picture>
            <source
              srcset="
                ./img/feature-info/feature-info3.png    1x,
                ./img/feature-info/feature-info3@2x.png 2x
              "
              type="image/png"
            />
            <img
              class="finf_feature-info-img"
              src="./img/feature-info/feature-info3.png"
              alt="No unnecessary distractions icon"
              loading="lazy"
            />
          </picture>
          <figcaption class="finf_feature-info-caption">
            No unnecessary distractions
          </figcaption>
        </figure>
      </div>
    </div>

    <div class="finf_feature-info-controls" aria-label="Slider navigation">
      <button
        type="button"
        class="finf_feature-info-ctrl-btn"
        data-fi-prev
        aria-label="Previous slide"
      >
        <svg class="finf_ctrl-icon">
          <use href="/sprite.svg#arow-back"></use>
        </svg>
      </button>

      <div class="finf_feature-info-dots" aria-label="Slides">
        <button
          type="button"
          class="finf_feature-info-dot active"
          data-fi-dot
          data-slide="0"
          aria-label="Go to slide 1"
        ></button>
        <button
          type="button"
          class="finf_feature-info-dot"
          data-fi-dot
          data-slide="1"
          aria-label="Go to slide 2"
        ></button>
        <button
          type="button"
          class="finf_feature-info-dot"
          data-fi-dot
          data-slide="2"
          aria-label="Go to slide 3"
        ></button>
      </div>

      <button
        type="button"
        class="finf_feature-info-ctrl-btn"
        data-fi-next
        aria-label="Next slide"
      >
        <svg class="finf_ctrl-icon">
          <use href="/sprite.svg#arow-forward"></use>
        </svg>
      </button>
    </div>

    <div class="finf_feature-info-description">
      <p>Play for two minutes...<br />or stay longer than you planned.</p>
      <p>
        It’s the kind of game you open “just for a break”<br />and realize —
        your mind is fully engaged again.
      </p>
    </div>
  </div>
</article>
